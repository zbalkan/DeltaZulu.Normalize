name: Publish NuGet package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_OUTPUT: ${{ github.workspace }}/artifacts/packages
      BINARY_OUTPUT: ${{ github.workspace }}/artifacts/binaries
      GITHUB_NUGET_SOURCE: https://nuget.pkg.github.com/DeltaZulu-OU/index.json
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - id: version
        name: Resolve package version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(dotnet msbuild src/DeltaZulu.Parse/DeltaZulu.Parse.csproj -getProperty:Version -nologo | tail -n 1)"
          if ! [[ "$source_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Version '$source_version' is not a supported SemVer package version." >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$source_version" ]]; then
              echo "Tag version '$tag_version' does not match source version '$source_version'." >&2
              exit 1
            fi
          fi

          echo "package_version=$source_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$source_version" >> "$GITHUB_OUTPUT"

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag '$RELEASE_TAG' already exists; update Directory.Build.props to an unpublished version." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" --message "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Restore locked dependencies
        run: dotnet restore DeltaZulu.Parse.slnx --locked-mode

      - name: Build solution
        run: dotnet build DeltaZulu.Parse.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/DeltaZulu.Parse.Tests/DeltaZulu.Parse.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack library
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: dotnet pack src/DeltaZulu.Parse/DeltaZulu.Parse.csproj --configuration Release --no-build --no-restore --output "$PACKAGE_OUTPUT" /p:PackageVersion="$PACKAGE_VERSION"

      - name: Inspect package contents
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          package="$PACKAGE_OUTPUT/DeltaZulu.Parse.$PACKAGE_VERSION.nupkg"
          unzip -l "$package"
          unzip -Z1 "$package" | grep -Fx README.md
          unzip -Z1 "$package" | grep -Fx LICENSE.txt
          unzip -Z1 "$package" | grep -Fx 'lib/net10.0/DeltaZulu.Parse.dll'
          ! unzip -Z1 "$package" | grep -E '(^|/)(DeltaZulu\.Parse\.Tests|LogNormalizer\.Cli|DeltaZulu\.Parse\.Benchmarks)(/|\.)'

      - name: Publish lognormalizer single-file binaries
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$BINARY_OUTPUT"
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            publish_dir="$RUNNER_TEMP/lognormalizer-$rid"
            dotnet publish src/tools/LogNormalizer.Cli/LogNormalizer.Cli.csproj \
              --configuration Release \
              --no-restore \
              --runtime "$rid" \
              --self-contained true \
              --output "$publish_dir" \
              /p:PublishSingleFile=true \
              /p:EnableCompressionInSingleFile=true \
              /p:DebugType=embedded \
              /p:PackageVersion="$PACKAGE_VERSION"

            if [[ "$rid" == win-* ]]; then
              binary="$publish_dir/lognormalizer.exe"
              asset="$BINARY_OUTPUT/lognormalizer-$PACKAGE_VERSION-$rid.zip"
              test -f "$binary"
              (cd "$publish_dir" && zip -9 -q "$asset" lognormalizer.exe)
            else
              binary="$publish_dir/lognormalizer"
              asset="$BINARY_OUTPUT/lognormalizer-$PACKAGE_VERSION-$rid.tar.gz"
              test -f "$binary"
              chmod +x "$binary"
              tar -C "$publish_dir" -czf "$asset" lognormalizer
            fi
          done
          find "$BINARY_OUTPUT" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Publish package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          config="$RUNNER_TEMP/github-packages-nuget.config"
          dotnet new nugetconfig --output "$RUNNER_TEMP" --force
          mv "$RUNNER_TEMP/nuget.config" "$config"
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            --configfile "$config" \
            "$GITHUB_NUGET_SOURCE"
          dotnet nuget push "$PACKAGE_OUTPUT"/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --configfile "$config" \
            --source github \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release '$RELEASE_TAG' already exists."
          else
            gh release create "$RELEASE_TAG" \
              --title "DeltaZulu.Parse $PACKAGE_VERSION" \
              --notes "Published DeltaZulu.Parse $PACKAGE_VERSION to GitHub Packages. Portable single-file lognormalizer binaries are attached for Linux, macOS, and Windows." \
          fi

          gh release upload "$RELEASE_TAG" "$PACKAGE_OUTPUT/DeltaZulu.Parse.$PACKAGE_VERSION.nupkg" --clobber
          for asset in "$BINARY_OUTPUT"/*; do
            gh release upload "$RELEASE_TAG" "$asset" --clobber
          done